# Production Configuration for Render
server.port=${PORT:8080}

# Database - Use environment variables on Render
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

# JWT from env var
jwt.secret=${JWT_SECRET:HospitalSystemSecretKeyForJWTTokenGenerationMustBe256BitsLongOrMore2024}
jwt.expiration=86400000

# CORS - allow Vercel frontend
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://*.vercel.app}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
